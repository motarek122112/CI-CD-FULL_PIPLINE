name: Assignment 6 Pipeline
#ee
on:
  push:
    branches:
      - "**"

jobs:
  linter:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run lightweight linter
        run: |
          echo "Running lightweight linter..."
          echo "Lint passed."

  train:
    name: Train
    needs: linter
    runs-on: ubuntu-latest
    if: ${{ needs.linter.result == 'success' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start training job
        run: |
          echo "Starting expensive GPU training job..."
          echo "Training completed successfully."

      - name: Create error log if training fails
        if: ${{ failure() }}
        run: echo "Training failed. Check configuration and logs." > error_logs.txt

      - name: Upload error logs artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt

      - name: Cleanup resources
        if: ${{ always() }}
        run: echo "Cleaning up temporary cloud volumes..."
