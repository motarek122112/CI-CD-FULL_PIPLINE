name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pathspec==0.12.1
          pip install -r requirements.txt

      - name: Pull data with DVC
        run: |
          echo "Skipping dvc pull in GitHub Actions due to Google Drive interactive authentication."
          echo "DVC workflow was validated locally."

      - name: Recreate dataset locally for CI
        run: python create_data.py

      - name: Train model and log to MLflow
        run: python train.py

      - name: Verify model_info.txt exists
        run: |
          test -f model_info.txt
          echo "model_info.txt found"
          cat model_info.txt

      - name: Verify mlflow.db exists
        run: |
          test -f mlflow.db
          echo "mlflow.db found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            model_info.txt
            mlflow.db

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pathspec==0.12.1
          pip install -r requirements.txt

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts

      - name: Show model_info.txt
        run: cat model_info.txt

      - name: Check model accuracy threshold
        run: python check_threshold.py

      - name: Mock Build Docker Image
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"